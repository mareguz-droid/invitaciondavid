<style>
  :root{
    --crema:#F4EDDD;
    --crema-clara:#FBF6E9;
    --azul:#2E4E85;
    --azul-osc:#213A66;
    --azul-real:#1E345C;
    --oro:#C29B40;
    --oro-claro:#E3C878;
    --oro-osc:#8F6E24;
    --carmesí:#9E2A2F;
    --carmesí-claro:#C24A50;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{overscroll-behavior:none}
  body{
    font-family:'Cormorant Garamond',serif;
    color:var(--azul-osc);
    background:
      radial-gradient(ellipse at top,#D2DEEC 0%,#BDCCE0 50%, #A8B9D1 100%);
    min-height:100vh;
    display:flex;justify-content:center;
    padding:14px 8px 26px;
  }

  .tarjeta{
    width:100%;max-width:440px;
    background:linear-gradient(180deg,#DDE7F1 0%, var(--crema-clara) 6%, var(--crema) 100%);
    border-radius:22px;
    box-shadow:
      0 26px 60px rgba(30,52,92,.32),
      0 0 0 1px var(--oro-claro),
      inset 0 0 0 3px rgba(255,255,255,.5);
    overflow:hidden;
    position:relative;
  }

  /* imagen superior */
  .cabecera{position:relative;z-index:1}
  .cabecera img{width:100%;display:block}
  /* fundido suave del borde inferior */
  .cabecera::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:80px;
    background:linear-gradient(180deg,rgba(244,237,221,0) 0%, var(--crema) 88%);
    pointer-events:none;
  }

  .cuerpo{
    position:relative;z-index:2;
    padding:0 26px 28px;
    text-align:center;
    margin-top:-40px;
  }

  /* ornamento separador estilo real */
  .flourish{
    display:flex;align-items:center;justify-content:center;gap:12px;
    color:var(--oro);margin:2px 0 20px;
  }
  .flourish::before,.flourish::after{
    content:"";flex:1;max-width:60px;height:1px;
    background:linear-gradient(90deg,transparent,var(--oro),transparent);
  }
  .flourish span{font-size:11px;letter-spacing:.3em}

  /* contador estilo relojes reales */
  .cont-tit{
    font-family:'Cinzel',serif;font-size:10.5px;font-weight:600;
    letter-spacing:.42em;text-transform:uppercase;color:var(--oro-osc);
    margin-bottom:14px;
  }

  .contador{
    display:flex;justify-content:center;gap:8px;
    margin-bottom:6px;
  }
  .cifra{
    position:relative;
    background:linear-gradient(180deg,#fff 0%, #FBF6E9 100%);
    border:1px solid var(--oro);
    border-radius:12px;
    min-width:66px;
    padding:12px 4px 8px;
    box-shadow:
      0 4px 12px rgba(198,155,64,.22),
      inset 0 1px 0 rgba(255,255,255,.9);
  }

  .cifra b{
    display:block;
    font-family:'Cinzel',serif;font-size:26px;font-weight:700;
    color:var(--azul-real);line-height:1;
    font-variant-numeric:tabular-nums;
    text-shadow:0 1px 0 #fff;
  }
  .cifra i{
    display:block;font-style:normal;
    font-family:'Cinzel',serif;font-size:9.5px;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;
    color:var(--oro-osc);margin-top:5px;
  }
  .zona-horaria{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:13px;color:#7A6633;margin-top:8px;letter-spacing:.03em;
  }
  .zona-horaria .bandera{
    display:inline-block;vertical-align:-1px;width:16px;height:10px;
    border-radius:1px;overflow:hidden;margin-right:4px;
    background:linear-gradient(180deg,
      #DE2910 0%,#DE2910 33%,
      #FCD116 33%,#FCD116 66%,
      #007A33 66%,#007A33 100%);
    box-shadow:0 0 0 0.5px rgba(0,0,0,.15);
  }

  /* panel de botones */
  .panel{
    margin-top:22px;
    background:linear-gradient(180deg,#fff, #FBF6E9);
    border:1.5px solid var(--oro);
    border-radius:26px;
    padding:14px 10px;
    box-shadow:
      0 8px 22px rgba(198,155,64,.18),
      inset 0 1px 0 rgba(255,255,255,.9);
  }
  .trio{display:flex;align-items:stretch}
  .trio a{
    flex:1;text-decoration:none;color:var(--azul-real);
    display:flex;flex-direction:column;align-items:center;gap:8px;
    padding:8px 4px;
    transition:transform .15s ease;
  }
  .trio a:active{transform:scale(.94)}
  .trio a:hover{color:var(--azul)}
  .trio .div{width:1px;background:linear-gradient(180deg,transparent, var(--oro-claro), transparent);margin:6px 0}
  .trio .ic{width:42px;height:42px;filter:drop-shadow(0 2px 3px rgba(143,110,36,.25))}
  .trio p{
    font-family:'Cinzel',serif;font-size:11px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;line-height:1.3;
  }

  .btn-principal{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:14px;text-decoration:none;
    font-family:'Cinzel',serif;font-weight:600;font-size:14.5px;
    letter-spacing:.16em;text-transform:uppercase;color:#fff;
    background:linear-gradient(180deg,#4064A0, var(--azul), var(--azul-real));
    border:1px solid #5477B3;
    padding:16px;border-radius:50px;
    box-shadow:
      0 10px 24px rgba(30,52,92,.4),
      inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-principal:active{transform:scale(.97);box-shadow:0 4px 14px rgba(30,52,92,.4)}

  .cierre{
    margin-top:22px;
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:17.5px;color:var(--azul);line-height:1.55;
  }
  .cierre-orn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    color:var(--oro);font-size:14px;margin-bottom:8px;
  }
  .cierre-orn::before,.cierre-orn::after{
    content:"";width:32px;height:1px;
    background:linear-gradient(90deg,transparent,var(--oro),transparent);
  }
  .firma-corazon{
    display:inline-block;vertical-align:-2px;margin-left:4px;
  }

  /* destellos dorados suaves */
  .destello{
    position:absolute;color:var(--oro-claro);opacity:0;
    pointer-events:none;font-size:13px;z-index:3;
    animation:brillar 6s ease-in-out infinite;
  }
  @keyframes brillar{
    0%,100%{opacity:0;transform:scale(.5) rotate(0deg)}
    50%{opacity:.85;transform:scale(1) rotate(15deg)}
  }
  @media (prefers-reduced-motion:reduce){.destello{animation:none;opacity:0}}
</style>
